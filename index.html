<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Chimple</title>

    <base href="%BASE_URL%" />

    <meta name="color-scheme" content="light dark" />

    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <link rel="manifest" href="%BASE_URL%manifest.json" />

    <link
      rel="shortcut icon"
      type="image/png"
      href="%BASE_URL%assets/icons/favicon.png"
    />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ionic App" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  </head>

  <body>
    <div id="root"></div>
    <canvas
      id="GameCanvas"
      style="display: ''; width: 0; height: 0"
      oncontextmenu="event.preventDefault()"
      tabindex="0"
    ></canvas>
    <script src="%BASE_URL%chimple-src/settings.js" charset="utf-8"></script>

    <script src="%BASE_URL%cocos-main.js" charset="utf-8"></script>

    <script type="text/javascript">
      (function () {
        var assetBase = '%BASE_URL%';

        if (typeof VConsole !== "undefined") {
          window.vConsole = new VConsole();
        }

        var debug = window._CCSettings.debug;
        function loadScript(moduleName, cb) {
          function scriptLoaded() {
            document.body.removeChild(domScript);
            domScript.removeEventListener("load", scriptLoaded, false);
            cb && cb();
          }
          var domScript = document.createElement("script");
          domScript.async = true;
          domScript.src = moduleName;
          domScript.addEventListener("load", scriptLoaded, false);
          document.body.appendChild(domScript);
        }

        loadScript(
          debug ? assetBase + "cocos2d-js.js" : assetBase + "cocos2d-js-min.js",
          function () {
            if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
              loadScript(
                debug ? assetBase + "physics.js" : assetBase + "physics-min.js",
                window.boot
              );
            } else {
              if (window.boot) window.boot();
            }
          }
        );
      })();
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
