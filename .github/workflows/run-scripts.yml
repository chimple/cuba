name: Run Admin Script

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      script_path:
        description: 'Path to Script (e.g. scripts/tickets/example/rename_school.py)'
        required: true
        type: string
      arguments:
        description: 'Optional arguments (e.g. --schoolId=123 --newName="New Name")'
        required: false
        type: string

jobs:
  execute-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install app dependencies
        run: |
          if [ -f "scripts/tickets/requirements.txt" ]; then pip install -r scripts/tickets/requirements.txt; fi

      - name: Set Environment Variables and Run Script
        env:
          SUPABASE_URL: ${{ github.event.inputs.environment == 'prod' && secrets.PROD_SUPABASE_URL || secrets.DEV_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.event.inputs.environment == 'prod' && secrets.PROD_SUPABASE_SERVICE_ROLE_KEY || secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Starting script execution for environment: ${{ github.event.inputs.environment }}"
          echo "Script: ${{ github.event.inputs.script_path }}"
          
          python ${{ github.event.inputs.script_path }} ${{ github.event.inputs.arguments }}
          
          echo "Script execution completed."
