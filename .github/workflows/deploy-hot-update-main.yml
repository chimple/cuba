name: Deploy Live Update Main

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Capawesome CLI
        run: npm install -g @capawesome/cli

      - name: Extract versionName
        id: version
        run: |
          VERSION_NAME=$(grep versionName android/app/build.gradle | sed -E 's/.*"([0-9.]+)".*/\1/')
          echo "versionName=$VERSION_NAME" >> $GITHUB_OUTPUT

          # Extract major version (before first dot)
          MAJOR_VERSION=$(echo "$VERSION_NAME" | cut -d '.' -f 1)
          echo "majorVersion=$MAJOR_VERSION" >> $GITHUB_OUTPUT

      - name: Define Live Update Channel
        id: channel
        run: |
          ENV_NAME="${{ vars.REACT_APP_ENV_MAIN }}"   # dev, main OR prod
          MAJOR="${{ steps.version.outputs.majorVersion }}"
          CHANNEL_NAME="${ENV_NAME}-${MAJOR}"

          echo "channelName=$CHANNEL_NAME" >> $GITHUB_OUTPUT
          echo "Using channel: $CHANNEL_NAME"

      - name: Build project
        env:
          CI: false
          VITE_API_KEY: ${{ secrets.REACT_APP_API_KEY }}
          VITE_AUTH_DOMAIN: ${{ secrets.REACT_APP_AUTH_DOMAIN }}
          VITE_PROJECT_ID: ${{ secrets.REACT_APP_PROJECT_ID }}
          VITE_STORAGE_BUCKET: ${{ secrets.REACT_APP_STORAGE_BUCKET }}
          VITE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_MESSAGING_SENDER_ID }}
          VITE_APP_ID: ${{ secrets.REACT_APP_APP_ID }}
          VITE_MEASUREMENT_ID: ${{ secrets.REACT_APP_MEASUREMENT_ID}}
          VITE_ALGOLIA_APP_ID: ${{ secrets.REACT_APP_ALGOLIA_APP_ID }}
          VITE_ALGOLIA_API_KEY: ${{ secrets.REACT_APP_ALGOLIA_API_KEY }}
          VITE_HOT_UPDATE_SERVER: ${{ secrets.SUPABASE_DEV_HOT_UPDATE_SERVER }}
          VITE_ALGOLIA_INDEX_NAME: ${{ secrets.REACT_APP_ALGOLIA_INDEX_NAME}}
          VITE_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL}}
          VITE_SUPABASE_KEY: ${{ secrets.REACT_APP_SUPABASE_KEY}}
          VITE_CLIENT_ID: ${{ secrets.REACT_APP_CLIENT_ID}}
          VITE_GROWTHBOOK_ID: ${{ secrets.REACT_APP_GROWTHBOOK_ID_MAIN }}
          VITE_RAPIDAPI_KEY: ${{ secrets.REACT_APP_RAPIDAPI_KEY }}
          VITE_ENCRYPTION_KEY: ${{ secrets.REACT_APP_ENCRYPTION_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.REACT_APP_SENTRY_DSN }}
          VITE_CAPACITOR_HOT_UPDATE_APP_ID: ${{ secrets.REACT_APP_CAPACITOR_HOT_UPDATE_APP_ID }}
          VITE_ENV: ${{ vars.REACT_APP_ENV_MAIN }}
          VITE_ENVIRONMENT: ${{ vars.REACT_APP_ENV_DEV }}
          VITE_LOG_LEVEL: ${{ vars.REACT_APP_LOG_LEVEL_MAIN }}

        run: npm run build && npx @capawesome/cli manifests:generate --path dist

      - name: Login to Capawesome Cloud
        env:
          CAPAWESOME_API_TOKEN: ${{ secrets.CAPAWESOME_API_TOKEN }}
        run: npx @capawesome/cli login --token "$CAPAWESOME_API_TOKEN"

      - name: Ensure live update channel exists
        env:
          VITE_CAPACITOR_HOT_UPDATE_APP_ID: ${{ secrets.REACT_APP_CAPACITOR_HOT_UPDATE_APP_ID }}
        run: |
          CHANNEL="${{ steps.channel.outputs.channelName }}"
          echo "Checking channel: $CHANNEL"

          CHANNELS=$(npx @capawesome/cli apps:channels:list --appId "$VITE_CAPACITOR_HOT_UPDATE_APP_ID")
          if echo "$CHANNELS" | grep -q "$CHANNEL"; then
            echo "Channel '$CHANNEL' exists."
          else
            echo "Channel '$CHANNEL' does not exist. Creating..."
            npx @capawesome/cli apps:channels:create --appId "$VITE_CAPACITOR_HOT_UPDATE_APP_ID" --name "$CHANNEL"
            echo "Channel '$CHANNEL' created."
          fi

      - name: Upload manifest-based bundle to Capawesome Cloud
        env:
          VITE_CAPACITOR_HOT_UPDATE_APP_ID: ${{ secrets.REACT_APP_CAPACITOR_HOT_UPDATE_APP_ID }}
        run: |
          CHANNEL="${{ steps.channel.outputs.channelName }}"

          npx @capawesome/cli apps:bundles:create \
            --appId "$VITE_CAPACITOR_HOT_UPDATE_APP_ID" \
            --path dist \
            --channel "$CHANNEL" \
            --artifact-type manifest \
            --custom-property version="${{ steps.version.outputs.versionName }}" \
            --commit-message "${{ github.event.head_commit.message || 'manual deploy' }}" \
            --commit-ref "${{ github.ref }}" \
            --commit-sha "${{ github.sha }}"

      - name: Done
        run: echo "Manifest-based bundle created and uploaded successfully."
