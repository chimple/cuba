name: Build Android

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v2
        with:
          submodules: true
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Setup java
        uses: actions/setup-java@v1
        with:
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v1
        with:
          node-version: 24.x

      - name: Install app dependencies
        run: npm install

      - name: Create Google Services JSON File and key.jks
        working-directory: ./android/app/
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_PROD }}
          SHA_KEY: ${{ secrets.SHA_KEY_PROD }}
        run: |
          echo $GOOGLE_SERVICES_JSON | base64 -di > google-services.json
          echo $SHA_KEY | base64 -di > key.jks
      - name: Build
        env:
          CI: false
          VITE_API_KEY: ${{ secrets.REACT_APP_API_KEY_PROD }}
          VITE_AUTH_DOMAIN: ${{ secrets.REACT_APP_AUTH_DOMAIN_PROD }}
          VITE_PROJECT_ID: ${{ secrets.REACT_APP_PROJECT_ID_PROD }}
          VITE_STORAGE_BUCKET: ${{ secrets.REACT_APP_STORAGE_BUCKET_PROD }}
          VITE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_MESSAGING_SENDER_ID_PROD }}
          VITE_APP_ID: ${{ secrets.REACT_APP_APP_ID_PROD }}
          VITE_MEASUREMENT_ID: ${{ secrets.REACT_APP_MEASUREMENT_ID_PROD}}
          VITE_ALGOLIA_APP_ID: ${{ secrets.REACT_APP_ALGOLIA_APP_ID }}
          VITE_ALGOLIA_API_KEY: ${{ secrets.REACT_APP_ALGOLIA_API_KEY }}
          VITE_HOT_UPDATE_SERVER: ${{ secrets.HOT_UPDATE_SERVER }}
          VITE_ALGOLIA_INDEX_NAME: ${{ secrets.REACT_APP_ALGOLIA_INDEX_NAME_PROD}}
          VITE_SUPABASE_URL: ${{ secrets.REACT_APP_PROD_SUPABASE_URL}}
          VITE_SUPABASE_KEY: ${{ secrets.REACT_APP_PROD_SUPABASE_KEY}}
          VITE_CLIENT_ID: ${{ secrets.REACT_APP_PROD_CLIENT_ID}}
          VITE_GROWTHBOOK_ID: ${{ secrets.REACT_APP_GROWTHBOOK_ID_MAIN }}
          VITE_RAPIDAPI_KEY: ${{ secrets.REACT_APP_RAPIDAPI_KEY }}
          VITE_PERISKOPE_API_KEY: ${{ secrets.REACT_APP_PERISKOPE_API_KEY }}
          VITE_PERISKOPE_API_BASE_URL: ${{ secrets.REACT_APP_PERISKOPE_API_BASE_URL }}
          VITE_ENCRYPTION_KEY: ${{ secrets.REACT_APP_ENCRYPTION_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.REACT_APP_SENTRY_DSN }}
          VITE_CAPACITOR_HOT_UPDATE_APP_ID: ${{ secrets.REACT_APP_CAPACITOR_HOT_UPDATE_APP_ID }}
          VITE_ENV: ${{ vars.REACT_APP_ENV_MAIN }}
          VITE_ENVIRONMENT: ${{ vars.REACT_APP_ENV_PROD }}
          VITE_LOG_LEVEL: ${{ vars.REACT_APP_LOG_LEVEL_PROD }}

        run: npm run build

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@v13.0.3
        with:
          args: deploy --only hosting:cuba-stage
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Make gradlew executable
        working-directory: ./android/
        run: chmod +x ./gradlew

      - name: Generate the Android App assembleDebug
        working-directory: ./android/
        run: ./gradlew assembleDebug

      - name: Deploy apk
        working-directory: .
        run: |
          cd android/app/build/outputs/apk/debug/
          git init
          git config --global user.email prakash@sutara.org
          git config --global user.name  bhanugummana
          git remote add origin https://${{ secrets.ACCESS_TOKEN }}@github.com/chimple/cuba.git
          git checkout -b main-apk
          git add app-debug.apk
          git commit -m "created apk"
          #git push --force secure-origin apk
          #git push --set-upstream origin gh-pages
          git push origin main-apk -f
